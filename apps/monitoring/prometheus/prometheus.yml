global:
  scrape_interval: 15s

scrape_configs:
  - job_name: 'api-gateway'
    static_configs:
      - targets: ['api-gateway:8009']

  - job_name: 'users-service'
    static_configs:
      - targets: ['users-service:8002']

  - job_name: 'leaders-service'
    static_configs:
      - targets: ['leaders-service:8006']

  - job_name: 'wallet-service'
    static_configs:
      - targets: ['wallet-service:8008']

  - job_name: 'marketplace-service'
    static_configs:
      - targets: ['marketplace-service:8004']

  - job_name: 'rabbitmq'
    static_configs:
      - targets: ['rabbitmq:15692']
